<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Les 2 Alpes — Pistekaart</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #070c14;
  --surface: #0f1924;
  --border: #1e2e42;
  --ice: #00d4ff;
  --snow: #f0f6ff;
  --muted: #4a6680;
  --nav-h: 52px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html,body { height:100%; overflow:hidden; background:var(--bg); font-family:'Barlow',sans-serif; color:var(--snow); touch-action:none; }

/* ── TOP BAR ── */
#topbar {
  height:var(--nav-h); background:rgba(7,12,20,.95); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 14px; gap:12px;
  backdrop-filter:blur(10px); z-index:100; position:relative; flex-shrink:0;
}
#back-btn {
  background:rgba(255,255,255,.06); border:1px solid var(--border); border-radius:8px;
  color:var(--snow); font-family:'Barlow',sans-serif; font-size:14px; font-weight:600;
  padding:7px 12px; cursor:pointer;
}
#back-btn:active { opacity:.7; }
.topbar-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; letter-spacing:1px; flex:1; }
#zoom-hint { font-size:11px; color:var(--muted); white-space:nowrap; }

/* ── MAP CONTAINER ── */
#map-wrap {
  position:relative;
  flex:1;
  overflow:hidden;
  width:100%;
  height:calc(100vh - var(--nav-h));
  background:#0a1628;
  cursor:grab;
}
#map-wrap:active { cursor:grabbing; }

/* The pannable/zoomable stage */
#stage {
  position:absolute;
  transform-origin:0 0;
  will-change:transform;
}

#piste-img {
  display:block;
  width:3000px;
  height:1490px;
  pointer-events:none;
}

/* SVG overlay — same size as image */
#piste-svg {
  position:absolute;
  top:0; left:0;
  width:3000px;
  height:1490px;
  overflow:visible;
}

/* ── SVG PISTE STYLES ── */
.piste-hit {
  fill:none;
  stroke:transparent;
  stroke-width:28;
  cursor:pointer;
  transition:stroke .15s;
}
.piste-vis {
  fill:none;
  stroke-width:5;
  stroke-linecap:round;
  stroke-linejoin:round;
  pointer-events:none;
  opacity:0;
  transition:opacity .2s;
}

/* piste colors */
.c-green  { stroke:#00e676; }
.c-blue   { stroke:#448aff; }
.c-red    { stroke:#ff5252; }
.c-black  { stroke:#cccccc; }
.c-lift   { stroke:#ff9100; stroke-dasharray:10 6; }
.c-gondola { stroke:#ffcc00; stroke-dasharray:none; stroke-width:6; }

/* hover glow */
.piste-group:hover .piste-vis,
.piste-group.active .piste-vis { opacity:1; }
.piste-group.active .piste-vis { stroke-width:7; filter:drop-shadow(0 0 6px currentColor); }

/* sector labels in SVG */
.sector-label {
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;
  font-weight:800;
  fill:rgba(255,255,255,0);
  pointer-events:none;
}

/* ── ROUTE PANEL ── */
#route-panel {
  position:fixed;
  bottom:0; left:0; right:0;
  background:rgba(10,15,26,.97);
  border-top:1px solid var(--border);
  border-radius:18px 18px 0 0;
  backdrop-filter:blur(20px);
  padding:10px 18px calc(18px + var(--safe-bottom));
  z-index:500;
  transform:translateY(100%);
  transition:transform .3s ease;
  max-height:65vh;
  overflow-y:auto;
}
#route-panel.open { transform:translateY(0); }
#rp-handle { width:32px; height:3px; background:var(--border); border-radius:2px; margin:0 auto 14px; }
#rp-close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px 8px; }
#rp-close:hover { color:var(--snow); }

.rp-name { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:800; line-height:1; padding-right:40px; }
.rp-badges { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 14px; }
.rp-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }

.rp-section-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:600; margin-bottom:8px; }
.route-steps { display:flex; flex-direction:column; gap:7px; margin-bottom:14px; }
.route-step { display:flex; align-items:flex-start; gap:10px; background:rgba(255,255,255,.04); border-radius:10px; padding:10px 12px; }
.route-step-icon { font-size:20px; flex-shrink:0; margin-top:1px; }
.route-step-text strong { color:var(--snow); font-weight:600; display:block; font-size:14px; }
.route-step-text span { color:var(--muted); font-size:12px; line-height:1.4; }

.rp-meta { display:flex; gap:20px; padding-top:12px; border-top:1px solid var(--border); }
.rp-meta-item { font-size:12px; color:var(--muted); }
.rp-meta-item strong { display:block; font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; color:var(--snow); }

/* ── LEGEND ── */
#legend {
  position:fixed; top:calc(var(--nav-h) + 10px); right:10px;
  background:rgba(10,15,26,.9); border:1px solid var(--border);
  border-radius:12px; padding:10px 12px; z-index:200;
  backdrop-filter:blur(10px); font-size:11px;
}
.leg-row { display:flex; align-items:center; gap:7px; margin-bottom:5px; color:var(--muted); }
.leg-row:last-child { margin-bottom:0; }
.leg-line { width:20px; height:3px; border-radius:2px; flex-shrink:0; }
.leg-dash { width:20px; height:3px; border-radius:2px; flex-shrink:0; background:repeating-linear-gradient(90deg,#ff9100 0,#ff9100 6px,transparent 6px,transparent 12px); }
</style>

const TYPE_LABELS = { green:'Groen', blue:'Blauw', red:'Rood', black:'Zwart', lift:'Gondola', cable:'Kabelbaan' };

// ── PANEL ─────────────────────────────────────────────────────────────────
let activeGroup = null;

function showPanel(id) {
  const p = PISTES[id];
  if (!p) return;

  // Highlight active piste
  if (activeGroup) activeGroup.classList.remove('active');
  activeGroup = document.querySelector(`[onclick="showPanel('${id}')"]`);
  if (activeGroup) activeGroup.classList.add('active');

  const isLift = p.type === 'lift';
  const typeLabel = TYPE_LABELS[p.type] || p.type;

  const stepsHtml = p.steps.map(s => `
    <div class="route-step">
      <div class="route-step-icon">${s.i}</div>
      <div class="route-step-text">
        <strong>${s.t}</strong>
        <span>${s.s}</span>
      </div>
    </div>`).join('');

  document.getElementById('rp-content').innerHTML = `
    <div class="rp-name">${p.name}</div>
    <div class="rp-badges">
      <span class="rp-badge" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}44">${typeLabel}</span>
      ${!isLift ? `<span class="rp-badge" style="background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)">${p.zone}</span>` : ''}
    </div>
    <div style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px">${p.info}</div>
    <div class="rp-section-label">🏠 Route vanaf Les Aroles</div>
    <div class="route-steps">${stepsHtml}</div>
    <div class="rp-meta">
      <div class="rp-meta-item"><strong>${p.time}</strong>Reistijd</div>
      <div class="rp-meta-item"><strong>${p.lifts}</strong>Lift(en)</div>
    </div>`;

  document.getElementById('route-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('route-panel').classList.remove('open');
  if (activeGroup) { activeGroup.classList.remove('active'); activeGroup = null; }
}

// ── PAN + ZOOM ────────────────────────────────────────────────────────────
const wrap = document.getElementById('map-wrap');
const stage = document.getElementById('stage');
const IMG_W = 3000, IMG_H = 1490;

let scale = 1, tx = 0, ty = 0;
let dragging = false, lastX = 0, lastY = 0;
let pinchDist = null;

function applyTransform(animate) {
  // Clamp
  const vw = wrap.clientWidth, vh = wrap.clientHeight;
  const minScale = Math.max(vw / IMG_W, vh / IMG_H) * 0.9;
  scale = Math.max(minScale, Math.min(5, scale));
  const maxTx = 0, minTx = vw - IMG_W * scale;
  const maxTy = 0, minTy = vh - IMG_H * scale;
  tx = Math.max(minTx, Math.min(maxTx, tx));
  ty = Math.max(minTy, Math.min(maxTy, ty));
  stage.style.transition = animate ? 'transform .2s ease' : 'none';
  stage.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  stage.style.transformOrigin = '0 0';
}

// Initial fit
window.addEventListener('load', () => {
  const vw = wrap.clientWidth, vh = wrap.clientHeight;
  scale = Math.max(vw / IMG_W, vh / IMG_H);
  tx = (vw - IMG_W * scale) / 2;
  ty = (vh - IMG_H * scale) / 2;
  applyTransform(false);
});

// Mouse
wrap.addEventListener('mousedown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  wrap.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform(false);
});
window.addEventListener('mouseup', () => { dragging = false; wrap.style.cursor = 'grab'; });

// Scroll zoom
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const px = e.clientX - rect.left, py = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 0.88;
  const newScale = Math.max(0.3, Math.min(5, scale * factor));
  tx = px - (px - tx) * (newScale / scale);
  ty = py - (py - ty) * (newScale / scale);
  scale = newScale;
  applyTransform(false);
}, { passive: false });

// Touch pan + pinch zoom
function getTouchDist(t) {
  return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
}
function getTouchMid(t, rect) {
  return {
    x: (t[0].clientX + t[1].clientX) / 2 - rect.left,
    y: (t[0].clientY + t[1].clientY) / 2 - rect.top
  };
}

wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    dragging = false;
    pinchDist = getTouchDist(e.touches);
  }
}, { passive: true });

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    tx += e.touches[0].clientX - lastX;
    ty += e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    applyTransform(false);
  } else if (e.touches.length === 2 && pinchDist !== null) {
    const newDist = getTouchDist(e.touches);
    const rect = wrap.getBoundingClientRect();
    const mid = getTouchMid(e.touches, rect);
    const factor = newDist / pinchDist;
    const newScale = Math.max(0.3, Math.min(5, scale * factor));
    tx = mid.x - (mid.x - tx) * (newScale / scale);
    ty = mid.y - (mid.y - ty) * (newScale / scale);
    scale = newScale;
    pinchDist = newDist;
    applyTransform(false);
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinchDist = null;
  if (e.touches.length === 0) { dragging = false; applyTransform(true); }
}, { passive: true });

// Close panel on map tap (if not on a piste)
wrap.addEventListener('click', e => {
  if (e.target === wrap || e.target === stage || e.target.id === 'piste-img') closePanel();
});
